name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  quality:
    name: Format, lint & type checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Format check (black)
        run: uv run --extra dev black --check .
      - name: Lint (flake8)
        run: uv run --extra dev flake8
      - name: Type check (mypy)
        run: uv run --extra dev mypy

  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      # Coverage is gated by `fail_under` in pyproject.toml; this step fails
      # the build if total coverage drops below the configured floor.
      - name: Run unit tests with coverage
        run: >-
          uv run --extra dev --python ${{ matrix.python-version }}
          pytest --cov --cov-report=term-missing

  integration:
    name: Database integration (PostgreSQL + MySQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      # The integration fixtures spin up ephemeral PostgreSQL/MySQL containers in
      # code via testcontainers (seeded from docker/initdb.sql) and tear them
      # down — no compose provisioning needed; the GitHub runner's Docker daemon
      # is used directly. `./scripts/test-integration.sh` remains the local path
      # that reuses a docker-compose stack via the SQL2JSON_TEST_*_URL overrides.
      - name: Run database integration tests
        run: >-
          uv run --extra dev --extra integration
          pytest -m integration tests/integration
